version: "3.9"

networks:
  obs-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  esdata:
  promdata:
  miniodata:

services:

  # ═══════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:15-alpine
    container_name: obs-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-myuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mypassword}
      POSTGRES_DB: ${DB_NAME:-mydatabase}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - obs-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-myuser} -d ${DB_NAME:-mydatabase}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: obs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - obs-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: obs-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
      - cluster.name=observability
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - obs-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    container_name: obs-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - obs-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: obs-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
    environment:
      - SPAN_STORAGE_TYPE=elasticsearch
      - ES_SERVER_URLS=http://elasticsearch:9200
    networks:
      - obs-network
    depends_on:
      elasticsearch:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: obs-otel-collector
    restart: unless-stopped
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./deploy/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
    networks:
      - obs-network
    depends_on:
      - jaeger
      - prometheus
      - elasticsearch

  minio:
    image: minio/minio:latest
    container_name: obs-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    networks:
      - obs-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: obs-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - obs-network

  # ═══════════════════════════════════════════════════════════════════
  # DATABASE MIGRATIONS (runs once after infra is healthy, then exits)
  # ═══════════════════════════════════════════════════════════════════

  flyway-migrate:
    build:
      context: ./flyway
      dockerfile: Dockerfile
    image: obs/flyway-migrate:${IMAGE_TAG:-latest}
    container_name: obs-flyway-migrate
    environment:
      - FLYWAY_URL=jdbc:postgresql://postgres:5432/${DB_NAME:-mydatabase}
      - FLYWAY_USER=${DB_USERNAME:-myuser}
      - FLYWAY_PASSWORD=${DB_PASSWORD:-mypassword}
    networks:
      - obs-network
    depends_on:
      postgres:
        condition: service_healthy
    command: migrate

  # ═══════════════════════════════════════════════════════════════════
  # BACKEND SERVICES
  # ═══════════════════════════════════════════════════════════════════

  user-management-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user-management-service
    image: obs/user-management-service:${IMAGE_TAG:-latest}
    container_name: obs-user-management
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_FLYWAY_ENABLED=false
      - JAVA_OPTS=-Xms512m -Xmx1g
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-mydatabase}
      - DB_USERNAME=${DB_USERNAME:-myuser}
      - DB_PASSWORD=${DB_PASSWORD:-mypassword}
      - JWT_SECRET=${JWT_SECRET:-bXktc3VwZXItc2VjcmV0LWtleS1mb3Itand0LXRva2VuLXNpZ25pbmctdGhhdC1pcy1sb25nLWVub3VnaC1mb3ItaG1hYy1zaGE1MTI=}
      - ELASTICSEARCH_URI=http://elasticsearch:9200
    networks:
      - obs-network
    depends_on:
      flyway-migrate:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  apm-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: apm-service
    image: obs/apm-service:${IMAGE_TAG:-latest}
    container_name: obs-apm
    restart: unless-stopped
    ports:
      - "8082:8082"
    volumes:
      - ./deploy/opentelemetry-javaagent.jar:/app/otel-agent.jar:ro
    environment:
      - SERVER_PORT=8082
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_FLYWAY_ENABLED=false
      - JAVA_OPTS=-Xms1g -Xmx2g
      - JAVA_TOOL_OPTIONS=-javaagent:/app/otel-agent.jar
      - OTEL_SERVICE_NAME=apm-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_TRACES_EXPORTER=otlp
      - DB_HOST=postgres
      - DB_PORT=5432
      - APM_DB_NAME=${DB_NAME:-mydatabase}
      - DB_USERNAME=${DB_USERNAME:-myuser}
      - DB_PASSWORD=${DB_PASSWORD:-mypassword}
      - JWT_SECRET=${JWT_SECRET:-bXktc3VwZXItc2VjcmV0LWtleS1mb3Itand0LXRva2VuLXNpZ25pbmctdGhhdC1pcy1sb25nLWVub3VnaC1mb3ItaG1hYy1zaGE1MTI=}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - PROMETHEUS_URL=http://prometheus:9090
      - JAEGER_QUERY_URL=http://jaeger:16686
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_AUTH=false
      - SMTP_STARTTLS=false
    networks:
      - obs-network
    depends_on:
      flyway-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      user-management-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  apm-report-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: apm-report-service
    image: obs/apm-report-service:${IMAGE_TAG:-latest}
    container_name: obs-apm-report
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      - SERVER_PORT=8084
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_FLYWAY_ENABLED=false
      - JAVA_OPTS=-Xms512m -Xmx1g
      - DB_HOST=postgres
      - DB_PORT=5432
      - REPORT_DB_NAME=${DB_NAME:-mydatabase}
      - DB_USERNAME=${DB_USERNAME:-myuser}
      - DB_PASSWORD=${DB_PASSWORD:-mypassword}
      - JWT_SECRET=${JWT_SECRET:-bXktc3VwZXItc2VjcmV0LWtleS1mb3Itand0LXRva2VuLXNpZ25pbmctdGhhdC1pcy1sb25nLWVub3VnaC1mb3ItaG1hYy1zaGE1MTI=}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - PROMETHEUS_URL=http://prometheus:9090
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_AUTH=false
      - SMTP_STARTTLS=false
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BUCKET=${MINIO_REPORT_BUCKET:-reports}
      - REPORT_RETENTION_DAYS=${REPORT_RETENTION_DAYS:-30}
      - REPORT_EMAIL_FROM=${REPORT_EMAIL_FROM:-reports@observability-platform.local}
    networks:
      - obs-network
    depends_on:
      flyway-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      apm-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  python-sidecar:
    build:
      context: ./backend/apm-ai-service/python-sidecar
      dockerfile: Dockerfile
    image: obs/python-sidecar:${IMAGE_TAG:-latest}
    container_name: obs-python-sidecar
    restart: unless-stopped
    ports:
      - "50051:50051"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
    networks:
      - obs-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('localhost',50051)); s.close()\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  apm-ai-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: apm-ai-service
    image: obs/apm-ai-service:${IMAGE_TAG:-latest}
    container_name: obs-apm-ai
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      - SERVER_PORT=8085
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_FLYWAY_ENABLED=false
      - JAVA_OPTS=-Xms512m -Xmx1g
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-mydatabase}
      - DB_USERNAME=${DB_USERNAME:-myuser}
      - DB_PASSWORD=${DB_PASSWORD:-mypassword}
      - JWT_SECRET=${JWT_SECRET:-bXktc3VwZXItc2VjcmV0LWtleS1mb3Itand0LXRva2VuLXNpZ25pbmctdGhhdC1pcy1sb25nLWVub3VnaC1mb3ItaG1hYy1zaGE1MTI=}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - PROMETHEUS_URL=http://prometheus:9090
      - ML_SIDECAR_HOST=python-sidecar
      - ML_SIDECAR_PORT=50051
      - ML_SIDECAR_TIMEOUT=${ML_SIDECAR_TIMEOUT:-30000}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
    networks:
      - obs-network
    depends_on:
      flyway-migrate:
        condition: service_completed_successfully
      python-sidecar:
        condition: service_healthy
      apm-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  apm-billing-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: apm-billing-service
    image: obs/apm-billing-service:${IMAGE_TAG:-latest}
    container_name: obs-apm-billing
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - SERVER_PORT=8086
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_FLYWAY_ENABLED=false
      - JAVA_OPTS=-Xms512m -Xmx1g
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-mydatabase}
      - DB_USERNAME=${DB_USERNAME:-myuser}
      - DB_PASSWORD=${DB_PASSWORD:-mypassword}
      - JWT_SECRET=${JWT_SECRET:-bXktc3VwZXItc2VjcmV0LWtleS1mb3Itand0LXRva2VuLXNpZ25pbmctdGhhdC1pcy1sb25nLWVub3VnaC1mb3ItaG1hYy1zaGE1MTI=}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - PROMETHEUS_URL=http://prometheus:9090
      - JAEGER_QUERY_URL=http://jaeger:16686
      - USER_SERVICE_URL=http://user-management-service:8081
    networks:
      - obs-network
    depends_on:
      flyway-migrate:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_healthy
      user-management-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8086/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════
  # FRONTEND
  # ═══════════════════════════════════════════════════════════════════

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: obs/frontend:${IMAGE_TAG:-latest}
    container_name: obs-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - obs-network
    depends_on:
      user-management-service:
        condition: service_healthy
      apm-service:
        condition: service_healthy
      apm-report-service:
        condition: service_healthy
      apm-ai-service:
        condition: service_healthy
      apm-billing-service:
        condition: service_healthy
