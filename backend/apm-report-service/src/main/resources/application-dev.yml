# ── Dev profile: H2 in-memory database (no PostgreSQL required) ───────────────
spring:
  datasource:
    url: jdbc:h2:mem:observability_reports_dev;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration-dev
    table: flyway_schema_history_report
    clean-disabled: false
    clean-on-validation-error: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  thymeleaf:
    cache: false

prometheus:
  url: http://localhost:9090

elasticsearch:
  url: http://localhost:9200

minio:
  url: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: reports

report:
  scheduler:
    check-interval-ms: 120000
    delivery-check-interval-ms: 60000

logging:
  level:
    com.observability: DEBUG
    org.springframework.security: DEBUG
