spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.actuate.autoconfigure.mail.MailHealthContributorAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    url: jdbc:h2:mem:observability_reports_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration-dev
    table: flyway_schema_history_report
    clean-disabled: false
    clean-on-validation-error: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  h2:
    console:
      enabled: false

  thymeleaf:
    cache: false

  cache:
    type: none

jwt:
  secret: bXktc3VwZXItc2VjcmV0LWtleS1mb3Itand0LXRva2VuLXNpZ25pbmctdGhhdC1pcy1sb25nLWVub3VnaC1mb3ItaG1hYy1zaGE1MTI=

prometheus:
  url: http://localhost:9090

elasticsearch:
  url: http://localhost:9200

minio:
  url: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: test-reports

report:
  scheduler:
    check-interval-ms: 999999999
    delivery-check-interval-ms: 999999999

logging:
  level:
    com.observability: DEBUG
