server:
  port: 0

spring:
  application:
    name: user-management-service-test

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  # Disable OAuth2 client auto-configuration for tests
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration

  elasticsearch:
    uris: http://localhost:19200

jwt:
  secret: bXktdGVzdC1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tc2lnbmluZy10aGF0LWlzLWxvbmctZW5vdWdoLWZvci1obWFjLXNoYTUxMi1hbGdvcml0aG0=
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

rate-limit:
  requests-per-second: 5
  burst-capacity: 10

logging:
  level:
    com.observability: DEBUG
    org.springframework.security: DEBUG
