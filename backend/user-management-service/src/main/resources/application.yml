server:
  port: 8081

spring:
  application:
    name: user-management-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mydatabase}
    username: ${DB_USERNAME:myuser}
    password: ${DB_PASSWORD:mypassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

 # Disable OAuth2 client auto-configuration in dev (no Azure AD available)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

  security:
    oauth2:
      client:
        registration:
          azure-ad:
            client-id: ${AZURE_AD_CLIENT_ID:azure-client-id}
            client-secret: ${AZURE_AD_CLIENT_SECRET:azure-client-secret}
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback"
        provider:
          azure-ad:
            issuer-uri: ${AZURE_AD_ISSUER_URI:https://login.microsoftonline.com/common/v2.0}
            authorization-uri: ${AZURE_AD_ISSUER_URI:https://login.microsoftonline.com/common/v2.0}/authorize
            token-uri: https://login.microsoftonline.com/${AZURE_AD_TENANT_ID:common}/oauth2/v2.0/token
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            user-name-attribute: preferred_username

  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

# ── JWT configuration ──────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS1mb3Itand0LXRva2VuLXNpZ25pbmctdGhhdC1pcy1sb25nLWVub3VnaC1mb3ItaG1hYy1zaGE1MTI=}
  access-token-expiration: 900000       # 15 minutes
  refresh-token-expiration: 604800000   # 7 days

# ── Rate limiting ──────────────────────────────────────────────────────────────
rate-limit:
  requests-per-second: 10
  burst-capacity: 20

# ── OpenAPI / Swagger UI ───────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Logging ────────────────────────────────────────────────────────────────────
logging:
  level:
    com.observability: INFO
    org.springframework.security: INFO

---
# Production profile: structured JSON logging
spring:
  config:
    activate:
      on-profile: production

logging:
  level:
    com.observability: INFO
    org.springframework.security: WARN
  pattern:
    console: ""
