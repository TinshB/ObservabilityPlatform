# ── Dev profile: H2 in-memory database (no PostgreSQL required) ───────────────
spring:
  datasource:
    url: jdbc:h2:mem:observability_dev;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration-dev
    clean-disabled: false
    clean-on-validation-error: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # Disable OAuth2 client auto-configuration in dev (no Azure AD available)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

  h2:
    console:
      enabled: true
      path: /h2-console

  elasticsearch:
    uris: http://localhost:19200

logging:
  level:
    com.observability: DEBUG
    org.springframework.security: DEBUG
