server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: apm-ai-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mydatabase}
    username: ${DB_USERNAME:myuser}
    password: ${DB_PASSWORD:mypassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# ── AI / gRPC sidecar ──────────────────────────────────────────────────────
ai:
  grpc:
    host: ${ML_SIDECAR_HOST:localhost}
    port: ${ML_SIDECAR_PORT:50051}
    timeout-ms: ${ML_SIDECAR_TIMEOUT:30000}
    max-message-size: 10485760        # 10 MB
  llm:
    provider: ${LLM_PROVIDER:openai}                # "openai" (default) or "anthropic"
    openai-api-key: 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               # Required when provider=openai
    openai-model: ${OPENAI_MODEL:gpt-4o}             # OpenAI model to use
    anthropic-api-key: ${ANTHROPIC_API_KEY:}          # Required when provider=anthropic
    anthropic-model: ${ANTHROPIC_MODEL:claude-sonnet-4-20250514}  # Anthropic model to use

# ── JWT (shared secret with user-management-service) ───────────────────────
jwt:
  secret: ${JWT_SECRET:default-secret-key-for-development-only-change-in-production}

# ── Actuator ───────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.observability.ai: INFO
    io.grpc: WARN
