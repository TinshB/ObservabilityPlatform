server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: apm-ai-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mydatabase}
    username: ${DB_USERNAME:myuser}
    password: ${DB_PASSWORD:mypassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# ── APM Service (internal REST calls) ─────────────────────────────────────
apm:
  service:
    base-url: ${APM_SERVICE_URL:http://localhost:8082}
    connect-timeout-ms: 5000
    read-timeout-ms: 30000

# ── AI / gRPC sidecar ──────────────────────────────────────────────────────
ai:
  grpc:
    host: ${ML_SIDECAR_HOST:localhost}
    port: ${ML_SIDECAR_PORT:50051}
    timeout-ms: ${ML_SIDECAR_TIMEOUT:30000}
    max-message-size: 10485760        # 10 MB
  llm:
    provider: ${LLM_PROVIDER:openai}                # "openai", "anthropic", or "gemini"
    openai-api-key: ${OPENAI_API_KEY:}               # Required when provider=openai
    openai-model: ${OPENAI_MODEL:gpt-4o}             # OpenAI model to use
    anthropic-api-key: ${ANTHROPIC_API_KEY:}          # Required when provider=anthropic
    anthropic-model: ${ANTHROPIC_MODEL:claude-sonnet-4-20250514}  # Anthropic model to use
    gemini-api-key: ${GEMINI_API_KEY:}               # Required when provider=gemini
    gemini-model: ${GEMINI_MODEL:gemini-2.5-flash}   # Google Gemini model to use

# ── JWT (shared secret with user-management-service) ───────────────────────
jwt:
  secret: ${JWT_SECRET:default-secret-key-for-development-only-change-in-production}

# ── Actuator ───────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.observability.ai: INFO
    io.grpc: WARN
