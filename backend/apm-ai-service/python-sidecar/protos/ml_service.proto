syntax = "proto3";

package observability.ai;

option java_multiple_files = true;
option java_package = "com.observability.ai.proto";
option java_outer_classname = "MlServiceProto";

// ── Anomaly Detection ────────────────────────────────────────────────────────

message AnomalyDetectionRequest {
  string service_name = 1;
  string metric_name = 2;
  repeated DataPoint data_points = 3;
  double sensitivity = 4;           // 0.0 (low) to 1.0 (high)
  string algorithm = 5;             // e.g., "isolation_forest", "z_score", "prophet"
}

message DataPoint {
  int64 timestamp_ms = 1;
  double value = 2;
}

message AnomalyDetectionResponse {
  repeated Anomaly anomalies = 1;
  string model_version = 2;
  double execution_time_ms = 3;
}

message Anomaly {
  int64 timestamp_ms = 1;
  double value = 2;
  double score = 3;                 // 0.0 (normal) to 1.0 (anomalous)
  double expected_value = 4;
  double lower_bound = 5;
  double upper_bound = 6;
  string severity = 7;             // INFO, WARNING, CRITICAL
}

// ── Root Cause Analysis ──────────────────────────────────────────────────────

message RootCauseRequest {
  string service_name = 1;
  int64 incident_start_ms = 2;
  int64 incident_end_ms = 3;
  repeated MetricSeries metrics = 4;
  repeated LogSummary logs = 5;
  repeated SpanSummary spans = 6;
}

message MetricSeries {
  string name = 1;
  map<string, string> labels = 2;
  repeated DataPoint data_points = 3;
}

message LogSummary {
  int64 timestamp_ms = 1;
  string severity = 2;
  string service_name = 3;
  string message = 4;
}

message SpanSummary {
  string trace_id = 1;
  string span_id = 2;
  string service_name = 3;
  string operation = 4;
  int64 duration_micros = 5;
  bool has_error = 6;
}

message RootCauseResponse {
  repeated RootCause causes = 1;
  string analysis_summary = 2;
  double confidence = 3;
  double execution_time_ms = 4;
}

message RootCause {
  string service_name = 1;
  string component = 2;
  string description = 3;
  double probability = 4;
  repeated string evidence = 5;
}

// ── Forecasting ──────────────────────────────────────────────────────────────

message ForecastRequest {
  string service_name = 1;
  string metric_name = 2;
  repeated DataPoint historical_data = 3;
  int32 forecast_horizon_minutes = 4;
  string algorithm = 5;             // e.g., "prophet", "arima", "linear"
}

message ForecastResponse {
  repeated ForecastPoint forecast = 1;
  string model_version = 2;
  double execution_time_ms = 3;
}

message ForecastPoint {
  int64 timestamp_ms = 1;
  double predicted_value = 2;
  double lower_bound = 3;
  double upper_bound = 4;
}

// ── Error Fix Suggestion (LLM-powered) ───────────────────────────────────────

message ErrorDiagnosisRequest {
  string trace_id = 1;
  repeated ErrorSpan error_spans = 2;
  repeated string associated_logs = 3;   // Log lines near the error window
  string language_hint = 4;              // e.g., "java", "python", "go"
  LlmConfig llm_config = 5;             // LLM provider config passed from Spring Boot
}

message LlmConfig {
  string provider = 1;                   // "openai" or "anthropic"
  string api_key = 2;
  string model = 3;
}

message ErrorSpan {
  string span_id = 1;
  string service_name = 2;
  string operation = 3;
  int64 duration_micros = 4;
  string http_method = 5;
  string http_url = 6;
  int32 http_status_code = 7;
  map<string, string> tags = 8;
  repeated string error_logs = 9;        // Error messages / stack traces from span logs
}

message ErrorDiagnosisResponse {
  string trace_id = 1;
  string summary = 2;                    // One-line diagnosis
  repeated ErrorFixSuggestion suggestions = 3;
  double confidence = 4;
  string llm_model = 5;
  double execution_time_ms = 6;
}

message ErrorFixSuggestion {
  string span_id = 1;
  string service_name = 2;
  string error_type = 3;                 // e.g., "NullPointerException", "TimeoutError"
  string diagnosis = 4;                  // Explanation of what went wrong
  string suggested_fix = 5;             // Actionable fix recommendation
  string code_snippet = 6;              // Optional code example
  string severity = 7;                  // CRITICAL, WARNING, INFO
  repeated string references = 8;       // Links to docs / known issues
}

// ── Health Check ─────────────────────────────────────────────────────────────

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;               // SERVING, NOT_SERVING
  string python_version = 2;
  repeated string loaded_models = 3;
  int64 uptime_seconds = 4;
}

// ── Service Definition ───────────────────────────────────────────────────────

service MlService {
  rpc DetectAnomalies (AnomalyDetectionRequest) returns (AnomalyDetectionResponse);
  rpc AnalyzeRootCause (RootCauseRequest) returns (RootCauseResponse);
  rpc Forecast (ForecastRequest) returns (ForecastResponse);
  rpc DiagnoseErrors (ErrorDiagnosisRequest) returns (ErrorDiagnosisResponse);
  rpc CheckHealth (HealthCheckRequest) returns (HealthCheckResponse);
}
