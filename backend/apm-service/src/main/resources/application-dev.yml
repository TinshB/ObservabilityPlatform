# ── Dev profile: H2 in-memory database (no PostgreSQL required) ───────────────
spring:
  datasource:
    url: jdbc:h2:mem:observability_apm_dev;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration-dev
    table: flyway_schema_history_apm
    clean-disabled: false
    clean-on-validation-error: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

prometheus:
  url: http://localhost:9090

logging:
  level:
    com.observability: DEBUG
    org.springframework.security: DEBUG
