server:
  port: 8086

spring:
  application:
    name: apm-billing-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${BILLING_DB_NAME:mydatabase}
    username: ${DB_USERNAME:myuser}
    password: ${DB_PASSWORD:mypassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      idle-timeout: 300000
      connection-timeout: 20000

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history
    validate-on-migrate: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

# ── Actuator / Micrometer (expose Prometheus scrape endpoint) ──────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: apm-billing-service

# ── User Management Service (licence summary — US-BILL-010) ──────────────
user-service:
  url: ${USER_SERVICE_URL:http://localhost:8081}
  connect-timeout: 5000
  read-timeout: 10000

# ── Prometheus (storage stats — US-BILL-002) ──────────────────────────────
prometheus:
  url: ${PROMETHEUS_URL:http://localhost:9090}
  connect-timeout: 5000
  read-timeout: 30000

# ── Jaeger (trace stats — US-BILL-003) ────────────────────────────────────
jaeger:
  query-url: ${JAEGER_QUERY_URL:http://localhost:16686}
  connect-timeout: 5000
  read-timeout: 30000
  avg-span-size-bytes: ${JAEGER_AVG_SPAN_SIZE:1024}

# ── Elasticsearch (storage stats — US-BILL-001) ───────────────────────────
elasticsearch:
  url: ${ELASTICSEARCH_URL:http://localhost:9200}
  log-index: ${ES_LOG_INDEX:logs-*}
  trace-index: ${ES_TRACE_INDEX:jaeger-span-*}

# ── JWT configuration (must match user-management-service secret) ──────────
jwt:
  secret: ${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS1mb3Itand0LXRva2VuLXNpZ25pbmctdGhhdC1pcy1sb25nLWVub3VnaC1mb3ItaG1hYy1zaGE1MTI=}

# ── OpenAPI / Swagger UI ───────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    com.observability: DEBUG
    org.springframework.security: INFO

---
# Production profile: structured JSON logging
spring:
  config:
    activate:
      on-profile: production

logging:
  level:
    com.observability: INFO
    org.springframework.security: WARN
  pattern:
    console: ""
