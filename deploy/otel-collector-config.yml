receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"
        cors:
          allowed_origins:
            - "*"

processors:
  # ── Memory Limiter ─────────────────────────────────────────────
  # Prevents OOM — must be FIRST in every pipeline
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128

  # ── Batch ──────────────────────────────────────────────────────
  batch:
    timeout: 5s
    send_batch_size: 1000
    send_batch_max_size: 1000

  # ── Trace Filters ─────────────────────────────────────────────
  # Drops health-check, readiness, and other noisy spans
  filter/traces:
    error_mode: ignore
    traces:
      span:
        - 'attributes["http.target"] == "/health"'
        - 'attributes["http.target"] == "/healthz"'
        - 'attributes["http.target"] == "/ready"'
        - 'attributes["http.target"] == "/readyz"'
        - 'attributes["http.target"] == "/livez"'
        - 'IsMatch(attributes["http.target"], "/actuator.*")'
        - 'attributes["http.target"] == "/favicon.ico"'
        - 'attributes["url.path"] == "/health"'
        - 'attributes["url.path"] == "/healthz"'
        - 'attributes["url.path"] == "/ready"'
        - 'IsMatch(attributes["url.path"], "/actuator.*")'
        - 'attributes["url.path"] == "/favicon.ico"'
        - 'attributes["http.route"] == "/health"'
        - 'attributes["http.route"] == "/healthz"'
        - 'IsMatch(attributes["http.route"], "/actuator.*")'
        - 'IsMatch(name, ".*health.*check.*")'

  # ── Log Filters ────────────────────────────────────────────────
  # Drops sub-INFO logs and health-check noise from logs pipeline
  filter/logs:
    error_mode: ignore
    logs:
      log_record:
        - 'severity_number < SEVERITY_NUMBER_INFO'
        - 'IsMatch(body, ".*healthcheck.*")'
        - 'IsMatch(body, ".*favicon\\.ico.*")'

  # ── Metric Filters ────────────────────────────────────────────
  # Drops internal collector metrics that add noise
  filter/metrics:
    error_mode: ignore
    metrics:
      metric:
        - 'name == "otelcol_process_uptime"'
        - 'name == "otelcol_process_runtime_total_alloc_bytes"'
        - 'name == "otelcol_process_runtime_heap_alloc_bytes"'
        - 'name == "otelcol_process_runtime_total_sys_memory_bytes"'

exporters:

  debug:
    verbosity: detailed

  otlp:
    endpoint: "jaeger:4317"
    tls:
       insecure: true

  prometheusremotewrite:
    endpoint: "http://prometheus:9090/api/v1/write"
    tls:
       insecure: true
    external_labels:
       label1: prometheus

  elasticsearch/trace:
    endpoint: "http://elasticsearch:9200"
    tls:
       insecure: true
    traces_index: my_trace
    sending_queue:
       enabled: true
       num_consumers: 20
       queue_size: 1000

  elasticsearch/log:
    endpoint: "http://elasticsearch:9200"
    logs_dynamic_index:
       enabled: true
    tls:
       insecure: true
    mapping:
       mode: "otel"
    sending_queue:
       enabled: true
       num_consumers: 20
       queue_size: 1000

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, filter/traces, batch]
      exporters: [debug, otlp]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, filter/logs, batch]
      exporters: [elasticsearch/log]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, filter/metrics, batch]
      exporters: [prometheusremotewrite]
  telemetry:
    logs:
      level: info