receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"
        cors:
          allowed_origins:
            - "*"

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000
    send_batch_max_size: 1000


exporters:

  debug:
    verbosity: detailed

  otlp:
    endpoint: "jaeger:4317"
    tls:
       insecure: true

  prometheusremotewrite:
    endpoint: "http://prometheus:9090/api/v1/write"
    tls:
       insecure: true
    external_labels:
       label1: prometheus

  elasticsearch/trace:
    endpoint: "http://elastic-search:9200"
    tls:
       insecure: true
    traces_index: my_trace
    sending_queue:
       enabled: true
       num_consumers: 20
       queue_size: 1000

  elasticsearch/log:
    endpoint: "http://elastic-search:9200"
    logs_dynamic_index:
       enabled: true
    tls:
       insecure: true
    mapping:
       mode: "otel"
    sending_queue:
       enabled: true
       num_consumers: 20
       queue_size: 1000
service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [elasticsearch/log]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheusremotewrite]
  telemetry:
    logs:
      level: info